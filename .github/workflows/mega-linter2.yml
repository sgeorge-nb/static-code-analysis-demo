name: MegaLinter (Reviewdog)

on:
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  megalinter:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install reviewdog
        run: |
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh | sh -s -- -b /usr/local/bin

      - name: Run MegaLinter
        uses: oxsecurity/megalinter@v9
        id: ml
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false

      - name: Run reviewdog on SARIF reports
        if: always()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d "megalinter-reports" ]; then
            find megalinter-reports -name "*.sarif" | while read file; do
              tool=$(basename "$file" .sarif)
              reviewdog \
                -f=sarif \
                -name="$tool" \
                -reporter=github-pr-check \
                -fail-on-error=false \
                < "$file"
            done
          fi

      - name: Fail if MegaLinter failed
        if: steps.ml.outcome == 'failure'
        run: exit 1
